services:
  pgstac:
    container_name: pgstac
    image: pgstac
    build:
      context: .
      network: host
      dockerfile: docker/pgstac/Dockerfile
      target: pgstac
    platform: linux/amd64
    environment:
      - POSTGRES_USER=username
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgis
      - PGUSER=username
      - PGPASSWORD=password
      - PGDATABASE=postgis
    ports:
      - "5439:5432"
    volumes:
      - pgstac-pgdata:/var/lib/postgresql/data
    command: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d postgis"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
  pypgstac:
    container_name: pypgstac
    image: pypgstac
    build:
      context: .
      network: host
      dockerfile: docker/pypgstac/Dockerfile
      target: pypgstac
    platform: linux/amd64
    environment:
      - PGHOST=pgstac
      - PGUSER=username
      - PGPASSWORD=password
      - PGDATABASE=postgis
    depends_on:
      pgstac:
        condition: service_healthy
volumes:
  pgstac-pgdata:
